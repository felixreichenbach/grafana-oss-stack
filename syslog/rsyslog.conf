module(load="imudp")

template(name="RawMessageTemplate" type="string" string="%msg%\n")

template(name="ConvertedMessageTemplate" type="string" string="<%$.pri%>1 %$.converted_time% %$.hostname% %$.app_name% - - - %$.msg_body%\n")

ruleset(name="forwardToAlloy") {

  # Write the inbound packet payload before any field extraction/reformatting.
  action(
    type="omfile"
    file="/var/log/raw_received_messages.log"
    template="RawMessageTemplate"
  )

  #1. Extract PRI from <PRI> in the raw header.
  set $.pri = re_extract($rawmsg, "^<([0-9]+)>", 0, 1, "134");

  #2. Extract the integer part of the epoch timestamp (digits before the dot)
  set $.epoch_seconds = re_extract($rawmsg, "^<[0-9]+>[0-9]+ ([0-9]+)\\.[0-9]+", 0, 1, "0");
  
  # 3. Convert the epoch integer into RFC3339 format
  set $.converted_time = format_time(cnum($.epoch_seconds), "date-rfc3339");

  # 4. Extract the Hostname
  set $.hostname = re_extract($rawmsg, "^<[0-9]+>[0-9]+ [0-9]+\\.[0-9]+ ([A-Z0-9]+(_[0-9]+)?)", 0, 1, "unknown_host");

  # 5. Extract the token between hostname and message text (e.g. app name).
  set $.app_name = re_extract($rawmsg, "^<[0-9]+>[0-9]+ [0-9]+\\.[0-9]+ [^ ]+ ([^ ]+)", 0, 1, "unknown_app");

  # 6. Extract everything after the app token.
  set $.msg_body = re_extract($rawmsg, "^<[0-9]+>[0-9]+ [0-9]+\\.[0-9]+ [^ ]+ [^ ]+ (.*)", 0, 1, "empty_message");
  
  # 7. Forward the message to a file for debugging
  action(
    type="omfile"
    file="/var/log/alloy_forwarded_messages.log"
    template="ConvertedMessageTemplate"
  )

  # 8. Forward the message to Alloy using the converted format
  action(
    type="omfwd"
    protocol="tcp"
    target="alloy"
    port="1514"
    template="ConvertedMessageTemplate"
    KeepAlive="on"
  )
  stop
}

input(type="imudp" port="514" ruleset="forwardToAlloy")