module(load="imudp")


template(name="ConvertedMessageTemplate" type="string" string="<134>1 %$.converted_time% %$.hostname% - - - - %$.msg_body%\n")

ruleset(name="forwardToAlloy") {
  #*.* /var/log/syslog

  #1. Extract the integer part of the epoch timestamp (digits before the dot)
  set $.epoch_seconds = re_extract($rawmsg, "^<[0-9]+>[0-9]+ ([0-9]+)\\.[0-9]+", 0, 1, "0");
  
  # 2. Convert the epoch integer into RFC3339 format
  set $.converted_time = format_time(cnum($.epoch_seconds), "date-rfc3339");

  # 3. Extract the Hostname
  set $.hostname = re_extract($rawmsg, "^<[0-9]+>[0-9]+ [0-9]+\\.[0-9]+ ([A-Z0-9]+(_[0-9]+)?)", 0, 1, "unknown_host");

  # 4. Extract everything after the Hostname
  set $.msg_body = re_extract($rawmsg, "^<[0-9]+>[0-9]+ [0-9]+\\.[0-9]+ [^ ]+ (.*)", 0, 1, "empty_message");
  
  # 5. Forward the message to a file for debugging
  action(
    type="omfile"
    file="/var/log/alloy_forwarded_messages.log"
    template="ConvertedMessageTemplate"
  )

  # 6. Forward the message to Alloy using the converted format
  action(
    type="omfwd"
    protocol="tcp"
    target="alloy"
    port="1514"
    template="ConvertedMessageTemplate"
    KeepAlive="on"
  )
  stop
}

input(type="imudp" port="514" ruleset="forwardToAlloy")