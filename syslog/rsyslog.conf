module(load="imudp")

template(name="RawMessageTemplate" type="string" string="%rawmsg%\n")
template(name="NormalizedMessageTemplate" type="string" string="%$.normalized_msg%\n")

ruleset(name="forwardToAlloy") {

  # Write the raw inbound packet payload before any field extraction/reformatting.
  action(
    type="omfile"
    file="/var/log/raw_received_messages.log"
    template="RawMessageTemplate"
  )

  # Branch by message format to produce RFC5424 output Alloy can always parse.
  if re_match($rawmsg, "^<[0-9]+>1 [0-9]+\\.[0-9]+ ") then {
    # Meraki-style epoch timestamp: rebuild header with RFC3339 time.
    set $.pri = re_extract($rawmsg, "^<([0-9]+)>", 0, 1, "134");
    set $.epoch_seconds = re_extract($rawmsg, "^<[0-9]+>[0-9]+ ([0-9]+)\\.[0-9]+", 0, 1, "0");
    set $.converted_time = format_time(cnum($.epoch_seconds), "date-rfc3339");
    set $.hostname = re_extract($rawmsg, "^<[0-9]+>[0-9]+ [0-9]+\\.[0-9]+ ([^ ]+)", 0, 1, "unknown_host");
    set $.app_name = re_extract($rawmsg, "^<[0-9]+>[0-9]+ [0-9]+\\.[0-9]+ [^ ]+ ([^ ]+)", 0, 1, "unknown_app");
    set $.msg_body = re_extract($rawmsg, "^<[0-9]+>[0-9]+ [0-9]+\\.[0-9]+ [^ ]+ [^ ]+ (.*)", 0, 1, "-");
    set $.normalized_msg = "<" & $.pri & ">1 " & $.converted_time & " " & $.hostname & " " & $.app_name & " - - - " & $.msg_body;
  } else if re_match($rawmsg, "^<[0-9]+>1 [0-9]{4}-[0-9]{2}-[0-9]{2}T") then {
    # Canonicalize RFC5424 lines to a parser-safe shape and move any payload into MSG.
    set $.pri = re_extract($rawmsg, "^<([0-9]+)>1 ", 0, 1, "134");
    set $.timestamp = re_extract($rawmsg, "^<[0-9]+>1 ([^ ]+)", 0, 1, "-");
    set $.hostname = re_extract($rawmsg, "^<[0-9]+>1 [^ ]+ ([^ ]+)", 0, 1, "unknown_host");
    set $.app_name = re_extract($rawmsg, "^<[0-9]+>1 [^ ]+ [^ ]+ ([^ ]+)", 0, 1, "unknown_app");
    set $.procid = re_extract($rawmsg, "^<[0-9]+>1 [^ ]+ [^ ]+ [^ ]+ ([^ ]+)", 0, 1, "-");
    set $.msgid = re_extract($rawmsg, "^<[0-9]+>1 [^ ]+ [^ ]+ [^ ]+ [^ ]+ ([^ ]+)", 0, 1, "-");
    set $.msg_body = re_extract($rawmsg, "^<[0-9]+>1 [^ ]+ [^ ]+ [^ ]+ [^ ]+ [^ ]+ ?(.*)", 0, 1, "-");
    set $.normalized_msg = "<" & $.pri & ">1 " & $.timestamp & " " & $.hostname & " " & $.app_name & " " & $.procid & " " & $.msgid & " - " & $.msg_body;
  } else if re_match($rawmsg, "^1 [0-9]{4}-[0-9]{2}-[0-9]{2}T") then {
    # Aruba/ClearPass RFC5424 body missing PRI: canonicalize with default PRI.
    set $.timestamp = re_extract($rawmsg, "^1 ([^ ]+)", 0, 1, "-");
    set $.hostname = re_extract($rawmsg, "^1 [^ ]+ ([^ ]+)", 0, 1, "unknown_host");
    set $.app_name = re_extract($rawmsg, "^1 [^ ]+ [^ ]+ ([^ ]+)", 0, 1, "unknown_app");
    set $.procid = re_extract($rawmsg, "^1 [^ ]+ [^ ]+ [^ ]+ ([^ ]+)", 0, 1, "-");
    set $.msgid = re_extract($rawmsg, "^1 [^ ]+ [^ ]+ [^ ]+ [^ ]+ ([^ ]+)", 0, 1, "-");
    set $.msg_body = re_extract($rawmsg, "^1 [^ ]+ [^ ]+ [^ ]+ [^ ]+ [^ ]+ ?(.*)", 0, 1, "-");
    set $.normalized_msg = "<134>1 " & $.timestamp & " " & $.hostname & " " & $.app_name & " " & $.procid & " " & $.msgid & " - " & $.msg_body;
  } else {
    # Fallback: wrap any other line into a minimal valid RFC5424 envelope.
    set $.normalized_msg = "<134>1 - rsyslog relay - - - " & $rawmsg;
  }
  
  # 7. Forward the normalized message to a file for debugging.
  action(
    type="omfile"
    file="/var/log/alloy_forwarded_messages.log"
    template="NormalizedMessageTemplate"
  )

  # 8. Forward the normalized message to Alloy using RFC5424 format.
  action(
    type="omfwd"
    protocol="tcp"
    target="alloy"
    port="1514"
    template="NormalizedMessageTemplate"
    TCP_Framing="octet-counted"
    KeepAlive="on"
  )
  stop
}

input(type="imudp" port="514" ruleset="forwardToAlloy")