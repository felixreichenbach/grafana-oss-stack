<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>grafana-oss-stack static site</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: linear-gradient(135deg, #f5f7fa, #e4ecf8);
      }
      main {
        background: #ffffff;
        border: 1px solid #dbe5f1;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        width: min(1100px, 95vw);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
        text-align: center;
      }
      iframe {
        width: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Embedded Grafana Dashboard</h1>
      <iframe
        src="http://localhost:3000/d/addpflb/embedded-dashboard?orgId=1&kiosk&auth_token=<YOUR_AUTH_TOKEN>"
        width="100%"
        height="600"
        frameborder="0">
      </iframe>
    </main>
  </body>
</html>
