include:
# - ./syslog/syslog.yml
  - ./openclaw/openclaw.yml

services:
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki

  alloy:
      image: grafana/alloy:latest
      container_name: alloy
      ports:
        - "1514:1514/tcp" # Opens TCP 1514 to the host/other containers
        - "1514:1514/udp" # Opens UDP 1514 for direct syslog ingestion
      volumes:
        - ./config.alloy:/etc/alloy/config.alloy:ro
      command: run --storage.path=/tmp/alloy-data /etc/alloy/config.alloy
      depends_on:
        - loki

volumes:
  grafana-data:
  loki-data:
