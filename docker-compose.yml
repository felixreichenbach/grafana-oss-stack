include:
  - ./alloy/alloy-container.yml
  - ./syslog/syslog-container.yml
  - ./tempo/tempo-container.yml
  - ./loki/loki-container.yml
  - ./snmp-traps/telegraf-container.yml
  - ./static-site/static-site-container.yml
# - ./openclaw/openclaw.yml

services:
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  grafana-data: