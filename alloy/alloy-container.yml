services:
  alloy:
      image: grafana/alloy:latest
      container_name: alloy
      ports:
        - "1514:1514/tcp" # Opens TCP 1514 to the host/other containers
        - "1514:1514/udp" # Opens UDP 1514 for direct syslog ingestion
      volumes:
        - ./config.alloy:/etc/alloy/config.alloy:ro
      command: run --stability.level=experimental --storage.path=/tmp/alloy-data /etc/alloy/config.alloy
      depends_on:
        - loki